<!DOCTYPE html>
<html lang="en">
    <!--Welcome to Comet. here is frontend code. Use for reference if making a contribution, or study for your own UBG/proxy. I don't mind.
    Comet's backend is not open source, so you may have to infer some things. If you see comments that look like ai, it's not. its just cause im a dumbass and need clarification on everything.
    All code is proprietary. Nothing is plagiarized. no frameworks are used. pray for me pls i suck as js-->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Comet</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="assets/comet-logo.png" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
        <script src="/baremux.js"></script>
        <script src="/scramjet.all.js"></script>
        <script type="module" src="app.js" defer></script>
        <link rel="stylesheet" href="variables.css">
    </head>
    <body>
        <div class="app">
            <div id="topbar"> <!--topbar container-->
                <img id="topbar-logo" src="assets/comet-logo.png" alt="axiom">

                <div class="topbar-right"> <!--for distinction between logo and nav/tab flex-->
                    <div id="tab-row">
                        <template id="tab" class="tabs">
                            <div class="tab-div">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-favicon"><path d="M21.54 15H17a2 2 0 0 0-2 2v4.54"/><path d="M7 3.34V5a3 3 0 0 0 3 3a2 2 0 0 1 2 2c0 1.1.9 2 2 2a2 2 0 0 0 2-2c0-1.1.9-2 2-2h3.17"/><path d="M11 21.95V18a2 2 0 0 0-2-2a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2H2.05"/><circle cx="12" cy="12" r="10"/></svg>
                                <p class="tab-name">New Tab</p>
                                <button class="tab-close-btn">&#x00D7</button>
                            </div>
                        </template>
                        <button class="new-tab" id="tab-new-btn">+</button>
                    </div>
                    <div id="nav-row">
                        <button class="nav-btn" id="back-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                        </button>

                        <button class="nav-btn" id="forward-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>

                        <button class="nav-btn" id="reload-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                        </button>

                        <div id="url-bar-display">
                            <input type="text" autocomplete="off" id="url-input" placeholder="Search Brave or type a URL...">
                            <div id="search-queries"></div>
                        </div>

                        <button class="nav-btn" id="share-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M12 2v13"/><path d="m16 6-4-4-4 4"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>

                        <button class="nav-btn" id="bookmark-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"/></svg>
                        </button>

                        <button class="nav-btn" id="noti-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
                        </button>

                        <button class="nav-btn" id="profile-btn-nav">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="navbtn-svg"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div id="bottom"> <!--distinction between flex for sidebar and main content area-->
                <div class="sidebar"> <!--sidebar container-->
                    <div class="sidebar-bm-column">
                        <button class="bookmarks">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bookmark-favicon"><path d="M21.54 15H17a2 2 0 0 0-2 2v4.54"/><path d="M7 3.34V5a3 3 0 0 0 3 3a2 2 0 0 1 2 2c0 1.1.9 2 2 2a2 2 0 0 0 2-2c0-1.1.9-2 2-2h3.17"/><path d="M11 21.95V18a2 2 0 0 0-2-2a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2H2.05"/><circle cx="12" cy="12" r="10"/></svg>
                        </button>
                    </div>
                    <button class="sidebar-app-select" id="sidebar-app-select">
                        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-apps-icon"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
                        <span class="apps-text">Apps</span>
                    </button>
                    <div class="sidebar-footer">
                        <div class="sidebar-footer-extras"> <!--terms/privacy/aup-->
                            <button class="sidebar-fe-button">Terms</button>
                            <button class="sidebar-fe-button">Privacy</button>
                            <button class="sidebar-fe-button-bottom" id="aup">AUP</button>
                        </div>
                    </div>
                </div>
                <div class="main-content-area"> <!--browsing viewport-->
                    <div id="iframe-area" class="iframe-area" style="width: 100%; height: 100%; background-color: var(--main-dark);"></div>

                    <div class="music-player" id="music-player-popup">  <!--music player obv-->
                        <div id="musicplayer-top">
                            <img id="cover-art" src="assets/album-cover-placeholder.jpg"></img>
                            <div id="music-info">
                                <h2 class="songinfo" id="songname">Nothing is playing</h2>
                                <h4 class="songinfo" id="songartist">John Doe</h4>
                            </div>
                        </div>
                        <div class="musicplayer-bottom">
                            <div id="controls-top">
                                <p id="song-progress-number">0:00</p>
                                <input type="range" id="song-progress" min="0" max="100" step="1">
                                <p id="song-remaining-number">0:00</p>
                            </div>
                            <div id="controls-bottom">
                                <button class="songcontrol-btn-side" id="song-back">
                                    <svg class="songcontrol-btn-svg" id="songback-svg" viewBox="0 0 24 24" fill="#3b5f95">
                                        <path d="M6 5c-.6 0-1 .4-1 1v12c0 .6.4 1 1 1s1-.4 1-1V6c0-.6-.4-1-1-1zm12.3 12.7c1 .6 2.2-.1 2.2-1.3V7.6c0-1.2-1.3-1.9-2.2-1.3l-8.3 4.8c-1 .6-1 2 0 2.6l8.3 4.8z"/>
                                    </svg>
                                </button>
                                <button class="songcontrol-btn" id="song-playpause">
                                    <svg class="songcontrol-btn-svg" id="songplaypause-svg" viewBox="0 0 24 24" fill="#08080f">
                                        <path d="M6 4.48c0-1.15 1.25-1.88 2.25-1.3l12.44 7.21c1 .58 1 2.02 0 2.6l-12.44 7.21c-1 .58-2.25-.15-2.25-1.3V4.48z" id="songplay-svg-path"/>
                                    </svg>
                                </button>
                                <button class="songcontrol-btn-side" id="song-forward">
                                    <svg class="songcontrol-btn-svg" id="songforward-svg" viewBox="0 0 24 24" fill="#3b5f95">
                                        <path d="M18 5c-.6 0-1 .4-1 1v12c0 .6.4 1 1 1s1-.4 1-1V6c0-.6-.4-1-1-1zM5.7 17.7c-1 .6-2.2-.1-2.2-1.3V7.6c0-1.2 1.3-1.9 2.2-1.3l8.3 4.8c1 .6 1 2 0 2.6l-8.3 4.8z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="app-select-options" id="app-select-popup">
                        <button class="app-option-btn" id="chats-app-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="appbtn-svg"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></svg>
                            Chats
                        </button>
                        <button class="app-option-btn" id="profile-app-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="appbtn-svg"><path d="M11.5 15H7a4 4 0 0 0-4 4v2"/><path d="M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/><circle cx="10" cy="7" r="4"/></svg>
                            Profile
                        </button>
                        <button class="app-option-btn" id="tools-app-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="appbtn-svg"><path d="m15 12-9.373 9.373a1 1 0 0 1-3.001-3L12 9"/><path d="m18 15 4-4"/><path d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172v-.344a2 2 0 0 0-.586-1.414l-1.657-1.657A6 6 0 0 0 12.516 3H9l1.243 1.243A6 6 0 0 1 12 8.485V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5"/></svg>
                            Tools
                        </button>
                        <button class="app-option-btn" id="orbitai-app-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="appbtn-svg"><path d="M12 6V2H8"/><path d="M15 11v2"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M20 16a2 2 0 0 1-2 2H8.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 4 20.286V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"/><path d="M9 11v2"/></svg>
                            OrbitAI
                        </button>
                        
                        <button class="app-option-btn" id="settings-app-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="settings-svg"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
                            Settings
                        </button>
                    </div>
                </div>
            </div>
            <div id="click-capture"></div>
        </div>
    </body>
</html>
