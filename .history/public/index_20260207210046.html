<!DOCTYPE html>
<html lang="en">
    <!--Welcome to Axiom v2. here is frontend code. Use for reference if making a contribution, or study for your own UBG/proxy. I don't mind.
    Axiom's backend is not open source, so you may have to infer some things. If you see comments that look like ai, it's not. its just cause im a dumbass and need clarification on everything.
    All code is proprietary. Nothing is plagiarized. no frameworks are used. pray for me pls i suck as js-->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Axiom v2</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="app">
            <div id="topbar"> <!--topbar container-->
                <img id="topbar-logo" src="assets/axiom-logo.jpg" alt="axiom">

                <div class="topbar-right"> <!--for distinction between logo and nav/tab flex-->
                    <div id="tab-row"></div>
                    <div id="nav-row">
                        <button class="nav-btn" id="back-btn-nav">
                            <img src="assets/arrow-left-svgrepo-com.svg" alt="click to go back">
                        </button>

                        <button class="nav-btn" id="forward-btn-nav">
                            <img src="assets/arrow-right-svgrepo-com.svg" alt="click to go forward">
                        </button>

                        <button class="nav-btn" id="reload-btn-nav">
                            <img src="assets/arrow-rotate-left-svgrepo-com.svg" alt="click to reload">
                        </button>

                        <div id="url-bar-display">
                            <input type="text" autocomplete="off" id="url-input" placeholder="Search DuckDuckGo or type a URL...">
                        </div>

                        <button class="nav-btn" id="share-btn-nav">
                            <img src="assets/share-svgrepo-com.svg" alt="click to share this page">
                        </button>

                        <button class="nav-btn" id="bookmark-btn-nav">
                            <img src="assets/bookmark-svgrepo-com.svg" alt="click to bookmark this page">
                        </button>

                        <button class="nav-btn" id="noti-btn-nav">
                            <img src="assets/bell-svgrepo-com.svg" alt="click to view notifications">
                        </button>

                        <button class="nav-profile-btn" id="profile-btn-nav">
                            <img src="will be user profile" alt="click to view profile">
                        </button>
                    </div>
                </div>
            </div>
            <div id="bottom"> <!--distinction between flex for sidebar and main content area-->
                <div class="sidebar"> <!--sidebar container-->
                    <div class="sidebar-bm-column">
                        <button class="bookmarks">This is an example bookmark</button>
                    </div>
                    <div class="sidebar-app-select">
                        <button class="app-select"></button>
                    </div>
                    <div class="sidebar-footer">
                        <button class="sidebar-settings-button">
                            <img src="assets/settings-svgrepo-com.svg" alt="click to open settings">
                        </button>
                        <div class="sidebar-footer-extras"> <!--terms/privacy/aup-->
                            <button class="sidebar-fe-button">Terms</button>
                            <button class="sidebar-fe-button">Privacy</button>
                            <button class="sidebar-fe-button-bottom" id="aup">AUP</button>
                        </div>
                    </div>
                </div>
                <div class="main-content-area"> <!--browsing viewport-->
                    <iframe id="pvp-frame" name="pvp-frame" src="https://iframetester.com" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </body>
</html>
